# Smoketests: Syntax, Bundle-Integrität, Inline-Handler-Referenzen, Config-Konsistenz.
# Läuft bei jedem Push (außer dem Bot-Commit des Cache-Busters).
name: Smoketest

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch: {}

jobs:
  smoketest:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Smoketests ausführen
        run: node scripts/smoketest.mjs
