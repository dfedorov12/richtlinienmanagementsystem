# Syntax-Schutznetz: prüft alle JS-Dateien per node --check bei jedem Push.
# Fängt Tippfehler/Parse-Fehler ab, bevor GitHub Pages kaputtes JS ausliefert.
name: Syntax-Check

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  check:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: node --check über alle JS-Dateien
        run: |
          status=0
          for f in js/*.js ki/*.js scripts/*.mjs; do
            if node --check "$f"; then echo "OK    $f"; else echo "FEHLER $f"; status=1; fi
          done
          exit $status
